[build]
  # 1. Netlify goes into your subfolder
  base = "rvo-site"
  
  # 2. Netlify runs the build command inside that folder
  command = "npm run build"
  
  # 3. Netlify hosts the 'dist' folder created inside 'rvo-site'
  # Since 'base' is 'rvo-site', we only need to say 'dist'
  publish = "dist"

[functions]
  # Path to your backend logic
  directory = "netlify/functions"

[dev]
  # Your local development settings
  command = "npm run dev"
  port = 8888
  targetPort = 5173